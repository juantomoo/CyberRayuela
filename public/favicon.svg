<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0a0a0f"/>
  <!-- Rayuela grid -->
  <rect x="30" y="5" width="40" height="18" rx="2" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.8"/>
  <rect x="10" y="27" width="38" height="18" rx="2" fill="none" stroke="#ff2d7b" stroke-width="1.5" opacity="0.8"/>
  <rect x="52" y="27" width="38" height="18" rx="2" fill="none" stroke="#ff2d7b" stroke-width="1.5" opacity="0.8"/>
  <rect x="30" y="49" width="40" height="18" rx="2" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.8"/>
  <rect x="30" y="71" width="40" height="18" rx="2" fill="none" stroke="#ff6b00" stroke-width="1.5" opacity="0.8"/>
  <!-- Glow stone -->
  <circle cx="50" cy="58" r="5" fill="#00f0ff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- "R" letter -->
  <text x="50" y="19" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#00f0ff">R</text>
</svg>
